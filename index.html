<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cook Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%97%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="brand">
        <span class="brand-mark">●</span>
        <span class="brand-name">Cook Book</span>
      </a>
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="hero-title">A small library of recipes.</h1>
      <p class="hero-sub">Search, sort and save dishes from around the world.</p>
    </section>

    <section class="controls">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search recipes"
          autocomplete="off"
        />
      </div>

      <div class="filters">
        <select id="categoryFilter" class="select" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>

        <select id="sortBy" class="select" aria-label="Sort">
          <option value="default">Sort</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="category">By category</option>
        </select>

        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="all" role="tab">All</button>
          <button class="tab" data-tab="favorites" role="tab">Saved</button>
        </div>
      </div>
    </section>

    <div id="status" class="status" aria-live="polite"></div>
    <section id="recipes" class="recipes-grid"></section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <span>Cook Book</span>
    <span class="dot">·</span>
    <span>Data from <a href="https://www.themealdb.com/" target="_blank" rel="noopener">TheMealDB</a></span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
